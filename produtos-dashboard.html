<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Produtos – PhenoBrasil</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
  --border: #2a2a2a; --gold: #c9a84c; --green: #3a7d44;
  --green2: #4caf50; --white: #f0ede8; --muted: #888; --red: #e05252;
}
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }
 
nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 70px; }
.nav-logo h2 { font-family: 'Barlow Condensed'; font-weight: 800; letter-spacing: 1px; }
.nav-actions { display: flex; align-items: center; gap: 1rem; }
.nav-link-btn { background: transparent; border: 1px solid var(--border); color: var(--white); padding: 0.5rem 1rem; cursor: pointer; font-family: 'Barlow Condensed'; font-weight: 700; text-transform: uppercase; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; display: inline-flex; align-items: center; border-radius: 2px; }
.nav-link-btn:hover { border-color: var(--gold); color: var(--gold); }
.logout-btn { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 0.5rem 1rem; cursor: pointer; font-family: 'Barlow Condensed'; font-weight: 700; text-transform: uppercase; transition: all 0.2s; border-radius: 2px; }
.logout-btn:hover { background: var(--red); color: #fff; }
 
.dashboard-container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
 
/* BOTÃO NOVO PRODUTO */
.nova-btn-bar { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }
.nova-btn { background: var(--green); color: #fff; border: none; padding: 0.7rem 1.5rem; font-family: 'Barlow Condensed'; font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
.nova-btn:hover { background: var(--green2); }
 
/* SEÇÕES RETRAÍDAS */
.section-collapsible { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 1.5rem; overflow: hidden; }
.section-toggle { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 1.5rem; cursor: pointer; user-select: none; transition: background 0.2s; }
.section-toggle:hover { background: var(--bg3); }
.section-toggle h3 { font-family: 'Barlow Condensed'; font-size: 1.3rem; font-weight: 800; text-transform: uppercase; color: var(--gold); margin: 0; }
.section-toggle-right { display: flex; align-items: center; gap: 1rem; }
.section-count { font-size: 0.8rem; color: var(--muted); font-family: 'Barlow Condensed'; }
.toggle-arrow { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; }
.section-collapsible.open .toggle-arrow { transform: rotate(180deg); }
.section-body { display: none; border-top: 1px solid var(--border); }
.section-collapsible.open .section-body { display: block; }
 
/* TOOLBAR */
.section-toolbar { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg3); }
.search-wrap { display: flex; align-items: center; gap: 0.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 2px; padding: 0.4rem 0.8rem; flex: 1; }
.search-wrap:focus-within { border-color: var(--gold); }
.search-wrap input { background: none; border: none; color: var(--white); font-family: 'Barlow'; font-size: 0.9rem; outline: none; width: 100%; }
.search-wrap span { color: var(--muted); }
 
/* LISTA PRODUTOS */
.section-list { padding: 1rem 1.5rem; }
.product-item { background: var(--bg3); border: 1px solid var(--border); padding: 1rem; border-radius: 2px; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
.product-item-img { width: 52px; height: 52px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); flex-shrink: 0; background: var(--bg2); }
.product-info { flex: 1; min-width: 0; }
.product-info h4 { font-family: 'Barlow Condensed'; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.product-info p { color: var(--muted); font-size: 0.82rem; margin-top: 0.2rem; }
.product-meta { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 0.5rem; flex-shrink: 0; }
.price-tag { color: var(--gold); font-weight: 700; font-family: 'Barlow Condensed'; font-size: 1.1rem; }
.action-btns { display: flex; gap: 0.4rem; }
.edit-btn { background: var(--gold); color: #000; border: none; padding: 0.3rem 0.8rem; font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; border-radius: 2px; }
.edit-btn:hover { opacity: 0.85; }
.del-btn { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 0.3rem 0.8rem; font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
.del-btn:hover { background: var(--red); color: #fff; }
 
/* PEDIDOS */
.pedido-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 2px; margin-bottom: 0.6rem; overflow: hidden; }
.pedido-header { display: flex; justify-content: space-between; align-items: center; padding: 0.9rem 1.2rem; cursor: pointer; gap: 1rem; }
.pedido-header:hover { background: var(--bg2); }
.pedido-id { font-family: 'Barlow Condensed'; font-size: 0.95rem; font-weight: 700; color: var(--white); }
.pedido-data { font-size: 0.75rem; color: var(--muted); }
.pedido-total { font-family: 'Barlow Condensed'; font-size: 1rem; font-weight: 700; color: var(--gold); }
.pedido-body { display: none; padding: 0.8rem 1.2rem; border-top: 1px solid var(--border); }
.pedido-card.open .pedido-body { display: block; }
.pedido-item-row { display: flex; align-items: center; gap: 0.8rem; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.pedido-item-row:last-child { border-bottom: none; }
.pedido-item-img { width: 36px; height: 36px; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); flex-shrink: 0; }
.badge-confirmado { background: #002a10; color: #00cc66; padding: 0.15rem 0.5rem; border-radius: 2px; font-family: 'Barlow Condensed'; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; }
 
/* MODAL PERFIL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--bg2); border: 1px solid var(--border); border-top: 3px solid var(--gold); max-width: 420px; width: 90%; padding: 2rem; border-radius: 4px; position: relative; max-height: 90vh; overflow-y: auto; }
.modal-box h3 { font-family: 'Barlow Condensed'; font-size: 1.4rem; font-weight: 800; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; }
.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--white); font-size: 1.4rem; cursor: pointer; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.05em; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--white); padding: 0.75rem 1rem; font-family: 'Barlow'; font-size: 0.9rem; outline: none; border-radius: 2px; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
.section-divider { font-family: 'Barlow Condensed'; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--gold); letter-spacing: 0.1em; margin: 1.2rem 0 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }
.submit-btn { width: 100%; background: var(--green); color: #fff; border: none; padding: 0.9rem; font-family: 'Barlow Condensed'; font-size: 1rem; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 2px; margin-top: 0.5rem; transition: background 0.2s; }
.submit-btn:hover { background: var(--green2); }
.cancel-btn-red { width: 100%; background: transparent; color: var(--red); border: 1px solid var(--red); padding: 0.6rem; font-family: 'Barlow Condensed'; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; cursor: pointer; margin-top: 0.5rem; border-radius: 2px; }
 
/* MODAL PRODUTO */
.modal-produto { background: var(--bg2); border: 1px solid var(--border); border-top: 3px solid var(--gold); width: 100%; max-width: 650px; padding: 2rem; border-radius: 4px; position: relative; max-height: 90vh; overflow-y: auto; }
.tag-input-wrap { display: flex; flex-wrap: wrap; gap: 0.4rem; background: var(--bg3); border: 1px solid var(--border); padding: 0.5rem; border-radius: 2px; min-height: 40px; align-items: center; cursor: text; }
.tag-input-wrap:focus-within { border-color: var(--gold); }
.tag { background: var(--bg2); border: 1px solid var(--border); color: var(--white); padding: 0.2rem 0.6rem; border-radius: 2px; font-size: 0.8rem; display: flex; align-items: center; gap: 0.3rem; }
.tag-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; line-height: 1; padding: 0; }
.tag-remove:hover { color: var(--red); }
.tag-input { background: none; border: none; color: var(--white); font-family: 'Barlow'; font-size: 0.85rem; outline: none; min-width: 80px; flex: 1; }
.variante-grupo { background: var(--bg3); border: 1px solid var(--border); border-radius: 2px; padding: 0.8rem; margin-bottom: 0.6rem; }
.variante-grupo-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
.variante-grupo-header input { flex: 1; background: var(--bg2); border: 1px solid var(--border); color: var(--white); padding: 0.4rem 0.7rem; font-family: 'Barlow Condensed'; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; border-radius: 2px; outline: none; }
.variante-grupo-header input:focus { border-color: var(--gold); }
.remove-grupo-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; transition: color 0.2s; }
.remove-grupo-btn:hover { color: var(--red); }
.add-variant-btn { background: transparent; border: 1px dashed var(--border); color: var(--muted); padding: 0.3rem 0.7rem; font-family: 'Barlow Condensed'; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
.add-variant-btn:hover { border-color: var(--gold); color: var(--gold); }
</style>
 
<!-- MODAL PERFIL -->
<div id="modal-perfil" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="window.fecharModalPerfil()">&times;</button>
    <h3>Editar Perfil</h3>
    <form onsubmit="window.salvarPerfil(event)">
      <div class="form-group"><label>Nome</label><input type="text" id="perfil-nome"></div>
      <div class="form-group"><label>Foto (URL)</label><input type="text" id="perfil-foto" placeholder="Confirme se o link direciona para o seu perfil"></div>
      <div class="section-divider">Alterar Senha <span style="font-weight:400;text-transform:none;color:var(--muted)">(opcional)</span></div>
      <div class="form-group"><label>Senha Atual</label><input type="password" id="current-pass" placeholder="Deixe em branco para não alterar"></div>
      <div class="form-group"><label>Nova Senha</label><input type="password" id="new-pass"></div>
      <div class="form-group"><label>Confirmar Nova Senha</label><input type="password" id="confirm-pass"></div>
      <button type="submit" class="submit-btn">Salvar Alterações</button>
      <button type="button" class="cancel-btn-red" onclick="window.fecharModalPerfil()">Cancelar</button>
    </form>
  </div>
</div>
 
<!-- MODAL PRODUTO (Novo / Editar) -->
<div id="modal-produto" class="modal-overlay">
  <div class="modal-produto">
    <button class="modal-close" onclick="window.fecharModalProduto()">&times;</button>
    <h3 id="modal-prod-title" style="font-family:'Barlow Condensed';font-size:1.4rem;font-weight:800;text-transform:uppercase;color:var(--gold);margin-bottom:1.2rem;">Novo Produto</h3>
    <form id="product-form" onsubmit="window.salvarProduto(event)">
      <input type="hidden" id="prod-id">
      <div class="section-divider">Informações Básicas</div>
      <div class="form-group"><label>Nome do Produto</label><input type="text" id="prod-name" placeholder="Ex: Camiseta PhenoBrasil" required></div>
      <div class="form-row">
        <div class="form-group"><label>Preço (R$)</label><input type="number" id="prod-price" placeholder="Ex: 89" step="0.01" required></div>
        <div class="form-group"><label>Categoria</label>
          <select id="prod-categoria">
            <option value="Roupas">Roupas</option>
            <option value="Impressão 3D">Impressão 3D</option>
            <option value="Acessório">Acessório</option>
            <option value="Moletom">Moletom</option>
            <option value="Calça">Calça</option>
            <option value="Outro">Outro</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Estoque (unidades)</label><input type="number" id="prod-estoque" placeholder="Ex: 10" min="0"></div>
        <div class="form-group"><label>Status</label>
          <select id="prod-status">
            <option value="ativo">Ativo</option>
            <option value="esgotado">Esgotado</option>
            <option value="inativo">Inativo</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>URL da Imagem</label><input type="text" id="prod-image" placeholder="https://exemplo.com/foto.jpg"></div>
      <div class="form-group"><label>Descrição</label><textarea id="prod-desc" placeholder="Descreva o produto, material, detalhes..."></textarea></div>
      <div class="section-divider">Variantes</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem">
        <span style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;font-weight:600">Grupos (tamanhos, cores, etc.)</span>
        <button type="button" class="add-variant-btn" onclick="window.adicionarGrupo()">+ Adicionar grupo</button>
      </div>
      <div id="variantes-container"></div>
      <button type="submit" id="btn-submit-text" class="submit-btn">Adicionar à Loja</button>
      <button type="button" class="cancel-btn-red" onclick="window.fecharModalProduto()">Cancelar</button>
    </form>
  </div>
</div>
 
<body>
<nav>
  <div class="nav-logo"><h2>PAINEL DE <span style="color:var(--gold)">PRODUTOS</span></h2></div>
  <div class="nav-actions">
    <a href="index.html" class="nav-link-btn">🏠 Página Inicial</a>
    <button class="nav-link-btn" onclick="window.abrirModalPerfil()" style="border-color:var(--gold);color:var(--gold);">⚙️ Meu Perfil</button>
    <button class="logout-btn" onclick="window.fazerLogout()">Sair</button>
  </div>
</nav>
 
<div class="dashboard-container">
 
  <!-- BOTÃO NOVO PRODUTO -->
  <div class="nova-btn-bar">
    <button class="nova-btn" onclick="window.abrirModalProduto()">+ Novo Produto</button>
  </div>
 
  <!-- MEUS PRODUTOS (retraído) -->
  <div class="section-collapsible open" id="sec-produtos">
    <div class="section-toggle" onclick="toggleSec('sec-produtos')">
      <h3>🛍️ Meus Produtos</h3>
      <div class="section-toggle-right">
        <span class="section-count" id="count-produtos"></span>
        <span class="toggle-arrow">▼</span>
      </div>
    </div>
    <div class="section-body">
      <div class="section-toolbar">
        <div class="search-wrap">
          <span>🔍</span>
          <input type="text" id="search-produtos" placeholder="Buscar produto..." oninput="window.filtrarProdutos()">
        </div>
      </div>
      <div class="section-list" id="products-list">
        <p style="color:var(--muted)">Carregando...</p>
      </div>
    </div>
  </div>
 
  <!-- MEUS PEDIDOS (retraído) -->
  <div class="section-collapsible" id="sec-pedidos">
    <div class="section-toggle" onclick="toggleSec('sec-pedidos', true)">
      <h3>📦 Meus Pedidos</h3>
      <div class="section-toggle-right">
        <span class="section-count" id="count-pedidos"></span>
        <span class="toggle-arrow">▼</span>
      </div>
    </div>
    <div class="section-body">
      <div class="section-toolbar">
        <div class="search-wrap">
          <span>🔍</span>
          <input type="text" id="search-pedidos" placeholder="Buscar por ID ou cliente..." oninput="window.filtrarPedidos()">
        </div>
      </div>
      <div class="section-list" id="pedidos-list">
        <p style="color:var(--muted)">Abra a seção para carregar.</p>
      </div>
    </div>
  </div>
 
</div>
 
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, query, where, getDocs, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
  const firebaseConfig = {
    apiKey: "AIzaSyAJTlL-4piG67VOM_y480dhyib2qaF3Bso",
    authDomain: "phenobrasil.firebaseapp.com",
    projectId: "phenobrasil",
    storageBucket: "phenobrasil.firebasestorage.app",
    messagingSenderId: "825755980394",
    appId: "1:825755980394:web:caad888821d128fb133013"
  };
 
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
 
  let usuarioAtual     = null;
  let produtosLocais   = [];
  let executandoLogout = false;
  let gruposVariantes  = [];
  let grupoIdCounter   = 0;
  let pedidosCarregados = false;
  let todosPedidos     = [];
 
  // ── AUTH ─────────────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (!userDoc.exists() || userDoc.data().desativado === true) {
          await signOut(auth); alert("Conta desativada."); location.href = 'index.html'; return;
        }
        const role  = userDoc.data().role;
        const roles = userDoc.data().roles || [];
        if (role !== 'vendedor' && role !== 'admin' && !roles.includes('vendedor')) {
          alert("❌ Acesso restrito a vendedores."); location.href = 'index.html'; return;
        }
      } catch(e) { console.error(e); }
      usuarioAtual = user;
      window.carregarProdutos();
    } else {
      if (!executandoLogout) location.href = 'index.html';
    }
  });
 
  // ── TOGGLE SEÇÕES ─────────────────────────────────────────
  window.toggleSec = (id, carregarPed = false) => {
    document.getElementById(id)?.classList.toggle('open');
    if (carregarPed && !pedidosCarregados && document.getElementById(id).classList.contains('open')) {
      pedidosCarregados = true;
      window.carregarPedidos();
    }
  };
 
  // ── MODAL PRODUTO ─────────────────────────────────────────
  window.abrirModalProduto = () => {
    window.cancelarEdicao();
    document.getElementById('modal-prod-title').textContent = 'Novo Produto';
    document.getElementById('btn-submit-text').textContent  = 'Adicionar à Loja';
    document.getElementById('modal-produto').classList.add('open');
  };
 
  window.fecharModalProduto = () => {
    document.getElementById('modal-produto').classList.remove('open');
    window.cancelarEdicao();
  };
 
  // ── VARIANTES ─────────────────────────────────────────────
  window.adicionarGrupo = (nomeInicial = '', tagsIniciais = []) => {
    const id = grupoIdCounter++;
    gruposVariantes.push({ id, nome: nomeInicial, tags: [...tagsIniciais] });
    renderGrupos();
  };
 
  const renderGrupos = () => {
    const container = document.getElementById('variantes-container');
    container.innerHTML = '';
    gruposVariantes.forEach((grupo, idx) => {
      const div = document.createElement('div');
      div.className = 'variante-grupo';
      div.innerHTML = `
        <div class="variante-grupo-header">
          <input type="text" placeholder="Nome do grupo (ex: Tamanho, Cor)" value="${grupo.nome}"
            oninput="window.atualizarNomeGrupo(${idx}, this.value)">
          <button type="button" class="remove-grupo-btn" onclick="window.removerGrupo(${idx})">×</button>
        </div>
        <div class="tag-input-wrap" id="tags-wrap-${idx}" onclick="document.getElementById('tag-input-${idx}').focus()">
          ${grupo.tags.map((t, ti) => `<span class="tag">${t}<button type="button" class="tag-remove" onclick="window.removerTag(${idx},${ti})">×</button></span>`).join('')}
          <input class="tag-input" id="tag-input-${idx}" placeholder="Digite e pressione Enter" onkeydown="window.adicionarTag(event, ${idx})">
        </div>`;
      container.appendChild(div);
    });
  };
 
  window.atualizarNomeGrupo = (idx, val) => { gruposVariantes[idx].nome = val; };
  window.removerGrupo = (idx) => { gruposVariantes.splice(idx, 1); renderGrupos(); };
  window.removerTag   = (idx, ti) => { gruposVariantes[idx].tags.splice(ti, 1); renderGrupos(); };
  window.adicionarTag = (e, idx) => {
    if ((e.key === 'Enter' || e.key === ',') && e.target.value.trim()) {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,/g, '');
      if (val && !gruposVariantes[idx].tags.includes(val)) {
        gruposVariantes[idx].tags.push(val); renderGrupos();
        setTimeout(() => document.getElementById(`tag-input-${idx}`)?.focus(), 0);
      } else { e.target.value = ''; }
    }
    if (e.key === 'Backspace' && !e.target.value && gruposVariantes[idx].tags.length) {
      gruposVariantes[idx].tags.pop(); renderGrupos();
    }
  };
 
  // ── SALVAR PRODUTO ────────────────────────────────────────
  window.salvarProduto = async (e) => {
    e.preventDefault();
    if (!usuarioAtual) return;
    const btn = document.getElementById('btn-submit-text');
    const id  = document.getElementById('prod-id').value;
 
    const dados = {
      name:          document.getElementById('prod-name').value.trim(),
      price:         parseFloat(document.getElementById('prod-price').value),
      categoria:     document.getElementById('prod-categoria').value,
      image:         document.getElementById('prod-image').value.trim(),
      descricao:     document.getElementById('prod-desc').value.trim(),
      variantes:     gruposVariantes.map(g => ({ nome: g.nome, opcoes: g.tags })),
      estoque:       parseInt(document.getElementById('prod-estoque').value) || 0,
      status:        document.getElementById('prod-status').value,
      vendedorUid:   usuarioAtual.uid,
      vendedorEmail: usuarioAtual.email,
    };
 
    try {
      btn.textContent = 'Salvando...'; btn.disabled = true;
      if (id) { await updateDoc(doc(db, "loja_produtos", id), dados); }
      else { dados.createdAt = serverTimestamp(); await addDoc(collection(db, "loja_produtos"), dados); }
      window.fecharModalProduto();
      await window.carregarProdutos();
      alert(id ? '✅ Produto atualizado!' : '✅ Produto adicionado à loja!');
    } catch (err) {
      alert('❌ Erro ao salvar: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = id ? 'Salvar Alterações' : 'Adicionar à Loja';
    }
  };
 
  // ── CARREGAR PRODUTOS ─────────────────────────────────────
  window.carregarProdutos = async () => {
    if (!usuarioAtual) return;
    const container = document.getElementById('products-list');
    try {
      const snap = await getDocs(query(collection(db, "loja_produtos"), where("vendedorUid", "==", usuarioAtual.uid)));
      container.innerHTML = '';
      produtosLocais = [];
      if (snap.empty) { container.innerHTML = '<p style="color:var(--muted)">Nenhum produto cadastrado.</p>'; return; }
      snap.forEach(docSnap => {
        const item = docSnap.data();
        produtosLocais.push({ id: docSnap.id, ...item });
        const variantes = (item.variantes || []).map(v => `${v.nome}: ${v.opcoes.join(', ')}`).join(' | ');
        const div = document.createElement('div');
        div.className = 'product-item';
        div.innerHTML = `
          <img class="product-item-img" src="${item.image || ''}" alt="${item.name}" onerror="this.style.display='none'">
          <div class="product-info">
            <h4>${item.name}</h4>
            <p>${item.categoria}${variantes ? ' · ' + variantes : ''} · Estoque: <strong style="color:${item.estoque === 0 ? 'var(--red)' : 'var(--green2)'}">${item.estoque !== undefined ? item.estoque : '—'}</strong></p>
          </div>
          <div class="product-meta">
            <span class="price-tag">R$ ${item.price.toFixed(2)}</span>
            <div class="action-btns">
              <button class="edit-btn" onclick="window.prepararEdicao('${docSnap.id}')">Editar</button>
              <button class="del-btn"  onclick="window.excluirProduto('${docSnap.id}', '${(item.name||'').replace(/'/g,"\\'")}')">Excluir</button>
            </div>
          </div>`;
        container.appendChild(div);
      });
      document.getElementById('count-produtos').textContent = `${produtosLocais.length} produto${produtosLocais.length !== 1 ? 's' : ''}`;
    } catch (e) { container.innerHTML = '<p style="color:var(--red)">Erro ao buscar produtos.</p>'; }
  };
 
  window.filtrarProdutos = () => {
    const busca = document.getElementById('search-produtos').value.toLowerCase();
    document.querySelectorAll('#products-list .product-item').forEach(item => {
      item.style.display = item.textContent.toLowerCase().includes(busca) ? '' : 'none';
    });
  };
 
  // ── EDITAR PRODUTO ────────────────────────────────────────
  window.prepararEdicao = (id) => {
    const item = produtosLocais.find(p => p.id === id);
    if (!item) return;
    document.getElementById('prod-id').value        = id;
    document.getElementById('prod-name').value      = item.name      || '';
    document.getElementById('prod-price').value     = item.price     || '';
    document.getElementById('prod-categoria').value = item.categoria || 'Roupas';
    document.getElementById('prod-estoque').value   = item.estoque !== undefined ? item.estoque : '';
    document.getElementById('prod-status').value    = item.status    || 'ativo';
    document.getElementById('prod-image').value     = item.image     || '';
    document.getElementById('prod-desc').value      = item.descricao || '';
    gruposVariantes = []; grupoIdCounter = 0;
    (item.variantes || []).forEach(v => window.adicionarGrupo(v.nome, v.opcoes));
    document.getElementById('modal-prod-title').textContent = 'Editando Produto';
    document.getElementById('btn-submit-text').textContent  = 'Salvar Alterações';
    document.getElementById('modal-produto').classList.add('open');
  };
 
  window.cancelarEdicao = () => {
    document.getElementById('product-form')?.reset();
    document.getElementById('prod-id').value = '';
    gruposVariantes = []; grupoIdCounter = 0; renderGrupos();
  };
 
  window.excluirProduto = async (id, nome) => {
    if (!confirm(`Excluir "${nome}" da loja?\n\nEssa ação não pode ser desfeita.`)) return;
    try { await deleteDoc(doc(db, "loja_produtos", id)); await window.carregarProdutos(); }
    catch (err) { alert('Erro ao excluir: ' + err.message); }
  };
 
  // ── PEDIDOS ───────────────────────────────────────────────
  window.carregarPedidos = async () => {
    const container = document.getElementById('pedidos-list');
    container.innerHTML = '<p style="color:var(--muted)">Carregando...</p>';
    try {
      const prodIds = produtosLocais.map(p => p.id);
      if (!prodIds.length) { container.innerHTML = '<p style="color:var(--muted)">Nenhum produto cadastrado.</p>'; return; }
 
      const snap = await getDocs(query(collection(db, 'pedidos'), where('status', '==', 'confirmado')));
      todosPedidos = [];
      snap.forEach(d => {
        const pedido = { id: d.id, ...d.data() };
        const itensMeus = (pedido.itens || []).filter(i => prodIds.includes(i.id));
        if (itensMeus.length) todosPedidos.push({ ...pedido, itensMeus });
      });
      todosPedidos.sort((a, b) => {
        const ta = a.criadoEm?.toDate?.() || new Date(0);
        const tb = b.criadoEm?.toDate?.() || new Date(0);
        return tb - ta;
      });
      document.getElementById('count-pedidos').textContent = `${todosPedidos.length} pedido${todosPedidos.length !== 1 ? 's' : ''}`;
      window.renderPedidos(todosPedidos);
    } catch(e) { container.innerHTML = `<p style="color:var(--red)">Erro: ${e.message}</p>`; }
  };
 
  window.renderPedidos = (lista) => {
    const container = document.getElementById('pedidos-list');
    if (!lista.length) { container.innerHTML = '<p style="color:var(--muted)">Nenhum pedido confirmado encontrado.</p>'; return; }
    container.innerHTML = '';
    lista.forEach(p => {
      const data     = p.criadoEm?.toDate ? p.criadoEm.toDate().toLocaleDateString('pt-BR') : '—';
      const totalMeu = p.itensMeus.reduce((s, i) => s + (i.price * i.qty), 0);
 
      // Mostra variantes no nome do item
      const itensHtml = p.itensMeus.map(i => `
        <div class="pedido-item-row">
          ${i.image ? `<img src="${i.image}" class="pedido-item-img" alt="">` : ''}
          <div>
            <div style="font-weight:600;color:var(--white)">${i.name}</div>
            <div style="font-size:0.78rem;color:var(--muted)">${i.qty}x · R$ ${(i.price * i.qty).toFixed(2).replace('.', ',')}</div>
          </div>
        </div>`).join('');
 
      const card = document.createElement('div');
      card.className = 'pedido-card';
      card.id = `pd-${p.id}`;
      card.innerHTML = `
        <div class="pedido-header" onclick="document.getElementById('pd-${p.id}').classList.toggle('open')">
          <div>
            <div class="pedido-id">#${p.id.slice(-6).toUpperCase()}</div>
            <div class="pedido-data">${data} · ${p.userEmail || '—'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:0.8rem">
            <span class="pedido-total">R$ ${totalMeu.toFixed(2).replace('.', ',')}</span>
            <span class="badge-confirmado">✅ Confirmado</span>
          </div>
        </div>
        <div class="pedido-body">${itensHtml}</div>`;
      container.appendChild(card);
    });
  };
 
  window.filtrarPedidos = () => {
    const busca = document.getElementById('search-pedidos').value.toLowerCase();
    const filtrados = todosPedidos.filter(p =>
      p.id.toLowerCase().includes(busca) || (p.userEmail||'').toLowerCase().includes(busca)
    );
    window.renderPedidos(filtrados);
  };
 
  // ── PERFIL ────────────────────────────────────────────────
  window.abrirModalPerfil = async () => {
    document.getElementById('modal-perfil').classList.add('open');
    try {
      const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
      if (userDoc.exists()) {
        document.getElementById('perfil-nome').value = userDoc.data().name  || '';
        document.getElementById('perfil-foto').value = userDoc.data().photo || '';
      }
    } catch(_) {}
  };
 
  window.fecharModalPerfil = () => {
    document.getElementById('modal-perfil').classList.remove('open');
    document.getElementById('current-pass').value = '';
    document.getElementById('new-pass').value      = '';
    document.getElementById('confirm-pass').value  = '';
  };
 
  window.salvarPerfil = async (e) => {
    e.preventDefault();
    const user        = auth.currentUser;
    const currentPass = document.getElementById('current-pass').value;
    const newPass     = document.getElementById('new-pass').value;
    const confirmPass = document.getElementById('confirm-pass').value;
    try {
      await setDoc(doc(db, "users", user.uid), {
        name:  document.getElementById('perfil-nome').value,
        photo: document.getElementById('perfil-foto').value
      }, { merge: true });
      if (currentPass || newPass || confirmPass) {
        if (!currentPass || !newPass || !confirmPass) { alert("Preencha todos os campos de senha."); return; }
        if (newPass !== confirmPass) { alert("As senhas novas não coincidem!"); return; }
        if (newPass.length < 6) { alert("Mínimo 6 caracteres."); return; }
        const cred = EmailAuthProvider.credential(user.email, currentPass);
        await reauthenticateWithCredential(user, cred);
        await updatePassword(user, newPass);
        alert("Perfil e senha atualizados!");
      } else { alert("Perfil atualizado!"); }
      window.fecharModalPerfil();
    } catch (err) {
      if (err.code === 'auth/wrong-password') alert("Senha atual incorreta.");
      else alert("Erro: " + err.message);
    }
  };
 
  window.fazerLogout = async () => {
    try { executandoLogout = true; await signOut(auth); location.href = 'index.html'; }
    catch (e) { executandoLogout = false; alert(e.message); }
  };
</script>
</body>
</html>
